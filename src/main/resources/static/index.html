<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Irrigation API Tester</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="app-header">
    <div>
        <h1>Smart Irrigation</h1>
        <p>Basic CRUD tester for the backend API</p>
    </div>
    <div class="status">
        <span>Current user ID</span>
        <strong id="currentUserId">-</strong>
    </div>
</header>

<main class="layout">
    <section class="panel">
        <h2>Auth</h2>
        <form id="registerForm" class="stack">
            <h3>Register</h3>
            <input name="name" placeholder="Name" value="Test User" required>
            <input name="email" type="email" placeholder="Email" value="test@example.com" required>
            <input name="password" type="password" placeholder="Password" value="password123" required>
            <button type="submit">Register</button>
        </form>

        <form id="loginForm" class="stack">
            <h3>Login</h3>
            <input name="email" type="email" placeholder="Email" value="bojan@example.com" required>
            <input name="password" type="password" placeholder="Password" value="password123" required>
            <button type="submit">Login</button>
        </form>

        <form id="findUserForm" class="stack">
            <h3>Find User</h3>
            <input name="userId" type="number" placeholder="User ID" value="1" required>
            <button type="submit">Find by ID</button>
        </form>
    </section>

    <section class="panel wide">
        <div class="section-head">
            <h2>Parcels</h2>
            <button id="loadParcelsBtn" type="button">Load User Parcels</button>
        </div>

        <form id="parcelForm" class="grid-form">
            <input name="id" type="number" placeholder="Parcel ID for update/delete">
            <input name="name" placeholder="Name" value="Test Field" required>
            <input name="location" placeholder="Location" value="Skopje" required>
            <input name="size" type="number" step="0.1" placeholder="Size" value="2.5" required>
            <input name="cropType" placeholder="Crop type" value="Tomatoes" required>
            <input name="lastIrrigation" type="date" value="2026-04-24">
            <textarea name="notes" placeholder="Notes">Created from frontend tester.</textarea>
            <div class="actions">
                <button type="submit" data-action="create">Create</button>
                <button type="button" id="updateParcelBtn">Update</button>
                <button type="button" id="deleteParcelBtn" class="danger">Delete</button>
            </div>
        </form>

        <div id="parcelsList" class="cards"></div>
    </section>

    <section class="panel">
        <h2>Irrigation History</h2>
        <form id="historyForm" class="stack">
            <input name="parcelId" type="number" placeholder="Parcel ID" required>
            <input name="waterAmount" type="number" step="0.1" placeholder="Water amount" value="100" required>
            <button type="submit">Add Irrigation</button>
            <button type="button" id="loadHistoryBtn">Load History</button>
        </form>
        <div id="historyList" class="list"></div>
    </section>

    <section class="panel">
        <h2>Schedules</h2>
        <form id="scheduleForm" class="stack">
            <input name="id" type="number" placeholder="Schedule ID for update/delete/execute">
            <input name="parcelId" type="number" placeholder="Parcel ID" required>
            <input name="intervalDays" type="number" placeholder="Interval days" value="3" required>
            <input name="waterAmount" type="number" step="0.1" placeholder="Water amount" value="120" required>
            <label class="check">
                <input name="active" type="checkbox" checked>
                Active
            </label>
            <div class="actions">
                <button type="submit">Create</button>
                <button type="button" id="updateScheduleBtn">Update</button>
                <button type="button" id="executeScheduleBtn">Execute</button>
                <button type="button" id="deleteScheduleBtn" class="danger">Delete</button>
            </div>
            <button type="button" id="loadSchedulesBtn">Load Parcel Schedules</button>
        </form>
        <div id="schedulesList" class="list"></div>
    </section>

    <section class="panel">
        <h2>Recommendations</h2>
        <form id="recommendationForm" class="stack">
            <input name="parcelId" type="number" placeholder="Parcel ID" required>
            <button type="submit">Get Daily Recommendation</button>
        </form>

        <form id="calculateForm" class="stack">
            <h3>Calculate Water</h3>
            <input name="parcelId" type="number" placeholder="Parcel ID" required>
            <input name="temperature" type="number" step="0.1" placeholder="Temperature" value="30" required>
            <input name="humidity" type="number" step="0.1" placeholder="Humidity" value="35" required>
            <label class="check">
                <input name="rainExpected" type="checkbox">
                Rain expected
            </label>
            <button type="submit">Calculate</button>
        </form>
    </section>

    <section class="panel wide">
        <div class="section-head">
            <h2>API Result</h2>
            <button id="clearOutputBtn" type="button">Clear</button>
        </div>
        <pre id="output">{}</pre>
    </section>
</main>

<script src="/app.js"></script>
</body>
</html>
